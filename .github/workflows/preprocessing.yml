name: Automated Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - 'diabetes_raw.csv'
      - 'preprocessing/automate_Indra-Ajiyanto.py'
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run preprocessing
        run: |
          python preprocessing/automate_Indra-Ajiyanto.py

      - name: Commit and push preprocessed dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/diabetes_preprocessing.csv
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push
